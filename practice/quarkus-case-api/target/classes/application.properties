# ---- External Pega Case API REST client ----
quarkus.rest-client.pega-case-api.url=http://some-endpoint
quarkus.rest-client.pega-case-api.scope=jakarta.inject.Singleton
quarkus.rest-client.pega-case-api.connect-timeout=5000
quarkus.rest-client.pega-case-api.read-timeout=15000
# Bump if HitsTagList payloads are large
quarkus.rest-client.pega-case-api.max-chunk-size=8K

# ---- Credentials (externalize via env vars / vault in real deployments) ----
# e.g. export PEGA_CLIENT_ID=... / PEGA_CLIENT_SECRET=...
pega.client.id=${PEGA_CLIENT_ID:client-id-1234567890}
pega.client.secret=${PEGA_CLIENT_SECRET:some-secret67JVMBM7KBVVV9DFD77V6FVFDVFDMB3234}

# ---- App ----
quarkus.http.port=8080
quarkus.log.level=INFO
quarkus.log.category."com.bank.caseapi".level=DEBUG

# Allow larger request bodies since HitsTagList JSON can be large
quarkus.http.limits.max-body-size=20M
